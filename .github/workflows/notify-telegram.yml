name: Telegram Notifications

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, reopened, merged]
  push:
    branches: [main, master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message_thread_id: ${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}
          format: markdown
          message: |
            *${{ github.repository }}*

            ${{ github.event_name == 'push' && format('🔀 Push to `{0}` by {1}', github.ref_name, github.actor) || '' }}${{ github.event_name == 'issues' && format('📋 Issue {0}: {1}', github.event.action, github.event.issue.title) || '' }}${{ github.event_name == 'pull_request' && format('🔃 PR {0}: {1}', github.event.action, github.event.pull_request.title) || '' }}

            ${{ github.event_name == 'push' && format('Commit: {0}', github.event.head_commit.message) || '' }}${{ github.event_name == 'issues' && github.event.issue.html_url || '' }}${{ github.event_name == 'pull_request' && github.event.pull_request.html_url || '' }}
