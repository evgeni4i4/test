name: Telegram Notifications

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed, reopened]
  push:
    branches: [main, master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build message
        id: message
        run: |
          REPO="${{ github.repository }}"
          EVENT="${{ github.event_name }}"

          if [ "$EVENT" = "push" ]; then
            MSG="🔀 *Push to \`${{ github.ref_name }}\`* by ${{ github.actor }}%0A%0ACommit: ${{ github.event.head_commit.message }}%0A${{ github.event.head_commit.url }}"
          elif [ "$EVENT" = "issues" ]; then
            MSG="📋 *Issue ${{ github.event.action }}:* ${{ github.event.issue.title }}%0A${{ github.event.issue.html_url }}"
          elif [ "$EVENT" = "pull_request" ]; then
            MSG="🔃 *PR ${{ github.event.action }}:* ${{ github.event.pull_request.title }}%0A${{ github.event.pull_request.html_url }}"
          fi

          echo "text=*${REPO}*%0A%0A${MSG}" >> "$GITHUB_OUTPUT"

      - name: Send to Telegram topic
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d message_thread_id="${{ secrets.TELEGRAM_MESSAGE_THREAD_ID }}" \
            -d parse_mode="Markdown" \
            --data-urlencode "text=$(echo -e '${{ steps.message.outputs.text }}')"
